name: Update Codebase Index

on:
  push:
    branches:
      - main
      - master

# Ensure only one run at a time to prevent commit race conditions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits to the branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch full depth so we can push
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust and Install indxr
        run: |
          cargo install indxr --features wiki

      - name: Install Gemini CLI
        run: |
          npm install -g @google/gemini-cli

      - name: Run Indexer Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./scripts/update_index.sh